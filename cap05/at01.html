<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formulário de Contato — Cap. 5 / Ativ. 1</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; line-height: 1.6; }
    div { margin-bottom: 15px; }
    label { display: block; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background-color: #2ecc71; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background-color: #27ae60; }
  </style>
</head>
<body>
  <h1>Entre em Contato</h1>

  <form action="https://httpbin.org/get" method="GET">
    
    <div>
      <label for="id-nome">Nome Completo:</label>
      <input type="text" id="id-nome" name="nome" required>
    </div>

    <div>
      <label for="id-email">E-mail:</label>
      <input type="email" id="id-email" name="email" required>
    </div>

    <div>
      <label for="id-assunto">Assunto:</label>
      <input type="text" id="id-assunto" name="assunto" required>
    </div>

    <div>
      <label for="id-mensagem">Mensagem:</label>
      <textarea id="id-mensagem" name="mensagem" rows="5" required></textarea>
    </div>

    <button type="submit">Enviar mensagem</button>
  </form>

  <p><a href="../index.html">← Voltar à página principal</a></p>
</body>
</html>
